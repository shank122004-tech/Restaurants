    <!-- Landing Page -->

        <div class="landing-wrapper">
            <nav class="landing-nav">

                        <div class="logo-icon">R</div>

            <section class="hero-section">

                        <p>Manage orders, staff, analytics, and payments. Enable customers to order instantly via QR code.</p>

            <section id="how-it-works" class="how-it-works-section">
                <div class="section-container">
                    <h2>How RestaurantOS Works</h2>
                    <div class="steps-grid">
                        <div class="step-card">
                            <div class="step-number">1</div>
                            <h3>Register</h3>
                            <p>Sign up with Google and complete restaurant details</p>
                        </div>
                        <div class="step-card">
                            <div class="step-number">2</div>
                            <h3>Build Menu</h3>
                            <p>Upload food items with images and prices</p>
                        </div>
                        <div class="step-card">
                            <div class="step-number">3</div>
                            <h3>Generate QR</h3>
                            <p>Get unique QR code and print on tables</p>
                        </div>
                        <div class="step-card">
                            <div class="step-number">4</div>
                            <h3>Customers Order</h3>

                        </div>
                        <div class="step-card">
                            <div class="step-number">5</div>
                            <h3>Manage Orders</h3>
                            <p>Track and manage kitchen display</p>
                        </div>
                        <div class="step-card">
                            <div class="step-number">6</div>

                        <div class="feature-card">

                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">📦</div>
                            <h3>Order Management</h3>
                            <p>Real-time order tracking and kitchen display system</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">📊</div>
                            <h3>Analytics Dashboard</h3>
                            <p>Track revenue, orders, popular foods and customer insights</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">👥</div>
                            <h3>Staff Management</h3>
                            <p>Manage kitchen staff and track performance</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">⭐</div>
                            <h3>Customer Reviews</h3>
                            <p>Collect and manage customer feedback and ratings</p>

                        <div class="feature-card">
                            <div class="feature-icon">🎟️</div>
                            <h3>Offers & Coupons</h3>

            <section id="testimonials" class="testimonials-section">

                        <div class="testimonial-card">

            <section id="faq" class="faq-section">
                <div class="section-container">
                    <h2>Frequently Asked Questions</h2>
                    <div class="faq-grid">
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFAQ(this)">
                                <h3>How does the QR code system work?</h3>
                                <span class="faq-toggle">+</span>
                            </div>
                            <div class="faq-answer">
                                <p>Print QR on all tables. Customers scan it, browse your menu, and order directly from their table. No apps needed!</p>
                            </div>
                        </div>
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFAQ(this)">
                                <h3>Do customers need to create an account?</h3>
                                <span class="faq-toggle">+</span>
                            </div>
                            <div class="faq-answer">
                                <p>No! Just scan QR and start ordering. No registration or login required.</p>
                            </div>
                        </div>
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFAQ(this)">
                                <h3>How do customers pay?</h3>
                                <span class="faq-toggle">+</span>
                            </div>
                            <div class="faq-answer">
                                <p>Customers pay CASH after receiving food. RestaurantOS is for ordering only.</p>
                            </div>
                        </div>
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFAQ(this)">
                                <h3>Does it work offline?</h3>
                                <span class="faq-toggle">+</span>
                            </div>
                            <div class="faq-answer">
                                <p>Yes! It's a PWA. Works offline and syncs when you're back online.</p>
                            </div>
                        </div>
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFAQ(this)">
                                <h3>Can I create offers?</h3>
                                <span class="faq-toggle">+</span>
                            </div>
                            <div class="faq-answer">
                                <p>Yes! Create special offers and coupons from dashboard.</p>
                            </div>
                        </div>
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFAQ(this)">
                                <h3>Is it scalable?</h3>
                                <span class="faq-toggle">+</span>
                            </div>
                            <div class="faq-answer">
                                <p>Absolutely! Built on Firebase. Handles unlimited orders automatically.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

                                <li>✓ Image Storage</li>
                                <li>✓ Priority Support</li>
                            </ul>
                            <button class="btn btn-primary" onclick="navigateTo('signin')">Get Started</button>
                        </div>
                    </div>
                </div>
            </section>

            <footer class="footer">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>RestaurantOS</h4>
                        <p>The complete platform for modern restaurants</p>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2024 RestaurantOS. All rights reserved.</p>
                </div>
            </footer>

    <!-- Auth Page -->
    <template id="auth-page">
        <div class="auth-wrapper premium-auth">
            <div class="auth-background">
                <div class="auth-bg-shape auth-bg-shape-1"></div>
                <div class="auth-bg-shape auth-bg-shape-2"></div>
                <div class="auth-bg-shape auth-bg-shape-3"></div>
            </div>
            <div class="auth-container">
                <div class="auth-card premium-auth-card">
                    <div class="auth-card-header">
                        <div class="auth-logo-section">
                            <div class="auth-logo-icon">
                                <span>🍽️</span>
                            </div>
                            <div class="auth-logo-text">
                                <h1>RestaurantOS</h1>
                                <p class="auth-tagline">Premium Restaurant Management</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="auth-content">
                        <div class="auth-greeting">
                            <h2>Welcome Back</h2>
                            <p>Sign in to manage your restaurant</p>
                        </div>
                        
                        <button class="btn btn-primary full-width auth-submit-btn" onclick="signInWithGoogle()">
                            <span class="google-icon">🔵</span>
                            Sign in with Google
                            <span class="btn-icon">→</span>
                        </button>
                    </div>
                    
                    <div class="auth-footer-section">
                        <p><a href="#" onclick="navigateTo('landing')" class="signup-link">Back to Home</a></p>
                    </div>
                    
                    <div class="auth-features">
                        <div class="feature-item">
                            <span class="feature-icon">📊</span>
                            <span class="feature-text">Real-time Analytics</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">🍜</span>
                            <span class="feature-text">Menu Management</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">📱</span>
                            <span class="feature-text">QR Ordering</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Restaurant Onboarding -->
    <template id="onboarding-page">
        <div class="onboarding-wrapper">
            <div class="onboarding-container">
                <div class="onboarding-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-text">Step <span id="current-step">1</span> of 5</div>
                </div>

                <!-- Step 1: Restaurant Info -->
                <div class="onboarding-step active" id="step-1">
                    <h2>Restaurant Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Restaurant Name *</label>
                            <input type="text" class="input" id="restaurantName" placeholder="Your Restaurant Name">
                        </div>
                        <div class="form-group">
                            <label>Restaurant Type *</label>
                            <select class="input" id="restaurantType">
                                <option>North Indian</option>
                                <option>South Indian</option>
                                <option>Chinese</option>
                                <option>Continental</option>
                                <option>Fast Food</option>
                                <option>Bakery</option>
                                <option>Cafe</option>
                                <option>Others</option>
                            </select>
                        </div>
                        <div class="form-group full">
                            <label>Restaurant Description</label>
                            <textarea class="input" id="restaurantDescription" placeholder="Tell customers about your restaurant" rows="4"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Owner Name *</label>
                            <input type="text" class="input" id="ownerName" placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <label>Phone *</label>
                            <input type="tel" class="input" id="phone" placeholder="+91 9876543210">
                        </div>
                        <div class="form-group">
                            <label>WhatsApp</label>
                            <input type="tel" class="input" id="whatsapp" placeholder="+91 9876543210">
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" class="input" id="email" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Website</label>
                            <input type="url" class="input" id="website" placeholder="https://yourrestaurant.com">
                        </div>
                        <div class="form-group">
                            <label>Instagram</label>
                            <input type="text" class="input" id="instagram" placeholder="@yourrestaurant">
                        </div>
                        <div class="form-group">
                            <label>Facebook</label>
                            <input type="text" class="input" id="facebook" placeholder="Your Page Name">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="nextStep()">Continue</button>
                </div>

                <!-- Step 2: Branding -->
                <div class="onboarding-step" id="step-2">
                    <h2>Restaurant Branding</h2>
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>Restaurant Logo</label>
                            <input type="file" class="input" id="logoInput" accept="image/*" onchange="previewImage('logo')">
                            <div id="logo-preview" class="image-preview"></div>
                        </div>
                        <div class="form-group full">
                            <label>Restaurant Banner</label>
                            <input type="file" class="input" id="bannerInput" accept="image/*" onchange="previewImage('banner')">
                            <div id="banner-preview" class="image-preview"></div>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="previousStep()">Back</button>
                        <button class="btn btn-primary" onclick="nextStep()">Continue</button>
                    </div>
                </div>

                <!-- Step 3: Address -->
                <div class="onboarding-step" id="step-3">
                    <h2>Restaurant Address</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Country *</label>
                            <input type="text" class="input" id="country" value="India" readonly>
                        </div>
                        <div class="form-group">
                            <label>State *</label>
                            <input type="text" class="input" id="state" placeholder="e.g., Maharashtra">
                        </div>
                        <div class="form-group">
                            <label>City *</label>
                            <input type="text" class="input" id="city" placeholder="e.g., Mumbai">
                        </div>
                        <div class="form-group">
                            <label>Area</label>
                            <input type="text" class="input" id="area" placeholder="e.g., Bandra">
                        </div>
                        <div class="form-group full">
                            <label>Complete Address *</label>
                            <textarea class="input" id="address" placeholder="Street address and details" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>PIN Code *</label>
                            <input type="text" class="input" id="pincode" placeholder="400050">
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="previousStep()">Back</button>
                        <button class="btn btn-primary" onclick="nextStep()">Continue</button>
                    </div>
                </div>

                <!-- Step 4: Timing -->
                <div class="onboarding-step" id="step-4">
                    <h2>Restaurant Timing & Details</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Opening Time *</label>
                            <input type="time" class="input" id="openingTime" value="11:00">
                        </div>
                        <div class="form-group">
                            <label>Closing Time *</label>
                            <input type="time" class="input" id="closingTime" value="23:00">
                        </div>
                        <div class="form-group">
                            <label>Number of Tables *</label>
                            <input type="number" class="input" id="tableCount" min="1" value="10">
                        </div>
                        <div class="form-group">
                            <label>Average Preparation Time (minutes)</label>
                            <input type="number" class="input" id="prepTime" value="20">
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="previousStep()">Back</button>
                        <button class="btn btn-primary" onclick="nextStep()">Continue to Payment</button>
                    </div>
                </div>

                <!-- Step 5: Payment -->
                <div class="onboarding-step" id="step-5">
                    <h2>Complete Your Setup</h2>
                    <div class="payment-info">
                        <h3>Subscription Details</h3>
                        <div class="pricing-box">
                            <div class="pricing-item">
                                <span>One-time Setup Fee</span>
                                <strong>₹999</strong>
                            </div>
                            <div class="pricing-item">
                                <span>Monthly Subscription</span>
                                <strong>₹199/month</strong>
                            </div>
                        </div>
                        <p class="info-text">After payment, you'll be able to generate QR codes and start receiving orders.</p>
                        <button class="btn btn-primary" onclick="initiatePayment()">Proceed to Payment</button>
                        <p class="payment-note">Secure payment powered by Cashfree</p>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="previousStep()">Back</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

                    <a class="nav-item" onclick="showDashboardPage('coupons')">
                        <span class="nav-icon">🎟️</span>
                        <span>Coupons</span>
                    </a>
                    <div class="nav-section-title">Account</div>
                    <a class="nav-item" onclick="showDashboardPage('profile')">
                        <span class="nav-icon">🏪</span>
                        <span>Profile</span>
                    </a>
                    <a class="nav-item" onclick="showDashboardPage('settings')">
                        <span class="nav-icon">⚙️</span>
                        <span>Settings</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="logout()">
                        <span>🚪</span>
                        <span>Logout</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div class="topbar">
                    <div class="topbar-left">
                        <button id="back-btn" class="btn btn-secondary" style="display: none; margin-right: 10px;" onclick="goBack()">← Back</button>
                        <h1 id="page-title">Dashboard</h1>
                    </div>
                    <div class="topbar-right">

    <template id="offer-modal">
        <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
            <div class="modal wide-modal">
                <div class="modal-header">
                    <h2>Create Special Offer</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>Offer Name *</label>
                            <input type="text" class="input" id="offerName" placeholder="e.g., Weekend Special">
                        </div>
                        <div class="form-group">
                            <label>Discount Type *</label>
                            <select class="input" id="offerType">
                                <option>Percentage</option>
                                <option>Fixed Amount</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Discount Value *</label>
                            <input type="number" class="input" id="offerValue" placeholder="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Minimum Order Value</label>
                            <input type="number" class="input" id="offerMinOrder" placeholder="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Valid From *</label>
                            <input type="date" class="input" id="offerStartDate">
                        </div>
                        <div class="form-group">
                            <label>Valid Till *</label>
                            <input type="date" class="input" id="offerEndDate">
                        </div>
                        <div class="form-group full">
                            <label>Description</label>
                            <textarea class="input" id="offerDescription" placeholder="Describe your offer..." rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="offerActive"> Active
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="saveOffer()">Create Offer</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Settings Page -->
    <template id="settings-page">
        <div class="page-wrapper">
            <div class="page-header">
                <h1>Restaurant Settings</h1>
            </div>
            <div class="settings-grid">
                <div class="card">
                    <div class="card-header">
                        <h3>Basic Information</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-grid">
                            <div class="form-group full">
                                <label>Restaurant Name</label>
                                <input type="text" class="input" id="settingsRestaurantName">
                            </div>
                            <div class="form-group full">
                                <label>Restaurant Description</label>
                                <textarea class="input" id="settingsDescription" rows="4"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Opening Time</label>
                                <input type="time" class="input" id="settingsOpeningTime">
                            </div>
                            <div class="form-group">
                                <label>Closing Time</label>
                                <input type="time" class="input" id="settingsClosingTime">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()">Save Changes</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Contact Information</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" class="input" id="settingsPhone">
                            </div>
                            <div class="form-group">
                                <label>WhatsApp Number</label>
                                <input type="tel" class="input" id="settingsWhatsapp">
                            </div>
                            <div class="form-group full">
                                <label>Email</label>
                                <input type="email" class="input" id="settingsEmail">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()">Save Changes</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Social Media</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-grid">
                            <div class="form-group full">
                                <label>Instagram URL</label>
                                <input type="url" class="input" id="settingsInstagram" placeholder="https://instagram.com/yourrestaurant">
                            </div>
                            <div class="form-group full">
                                <label>Facebook URL</label>
                                <input type="url" class="input" id="settingsFacebook" placeholder="https://facebook.com/yourrestaurant">
                            </div>
                            <div class="form-group full">
                                <label>Website URL</label>
                                <input type="url" class="input" id="settingsWebsite" placeholder="https://yourrestaurant.com">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()">Save Changes</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>🪑 Advanced Table Management</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>Total Tables</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="number" class="input" id="tableCountInput" min="1" max="99" placeholder="Number of tables">
                                <button class="btn btn-primary" onclick="updateTableCount()" style="flex: 0 0 auto;">Update</button>
                            </div>
                        </div>
                        <div id="tables-list" style="margin-top: 20px;">
                            <!-- Tables will be loaded here -->
                        </div>
                        <button class="btn btn-success" onclick="addTableManually()" style="margin-top: 15px;">+ Add Table Manually</button>
                        <button class="btn btn-primary" onclick="saveTables()" style="margin-top: 10px;">💾 Save All Changes</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>🕐 Restaurant Hours & Holidays</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Opening Time</label>
                                <input type="time" class="input" id="settingsOpeningTime">
                            </div>
                            <div class="form-group">
                                <label>Closing Time</label>
                                <input type="time" class="input" id="settingsClosingTime">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="updateRestaurantHours()" style="margin-bottom: 15px;">Update Hours</button>
                        
                        <div style="border-top: 1px solid #E5E7EB; padding-top: 15px;">
                            <label style="display: block; margin-bottom: 10px;">Restaurant Status</label>
                            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                                <button class="btn btn-danger" onclick="setRestaurantClosed('temporary')" style="flex: 1;">Close Temporarily</button>
                                <button class="btn btn-success" onclick="reopenRestaurant()" style="flex: 1;">Reopen</button>
                            </div>
                            <div id="restaurant-status" style="padding: 10px; background: #F3F4F6; border-radius: 6px; font-size: 0.9rem;">
                                <!-- Status will be shown here -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Subscription & Billing</h3>
                    </div>
                    <div class="card-body">
                        <div class="subscription-info" id="subscription-info">
                            <p>Loading subscription details...</p>
                        </div>
                        <button class="btn btn-secondary" onclick="manageSubscription()">Manage Subscription</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Admin Login Page -->
    <template id="admin-login-page">
        <div class="auth-wrapper">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-logo">
                        <div class="logo-icon">A</div>
                        <span>RestaurantOS Admin</span>
                    </div>
                    <h2>Admin Login</h2>
                    <p>Sign in to manage the platform</p>
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>Admin Email</label>
                            <input type="email" class="input" id="adminEmail" placeholder="admin@restaurantos.com">
                        </div>
                        <div class="form-group full">
                            <label>Password</label>
                            <input type="password" class="input" id="adminPassword" placeholder="Enter password">
                        </div>
                    </div>
                    <button class="btn btn-primary full-width" onclick="adminLogin()">Sign In</button>
                    <button class="btn btn-secondary full-width" onclick="navigateTo('landing')">Back to Landing</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Admin Dashboard Page -->
    <template id="admin-dashboard-page">
        <div class="page-wrapper">
            <div class="page-header">
                <h1>Admin Dashboard</h1>
                <button class="btn btn-secondary" onclick="adminLogout()">Logout</button>
            </div>
            <div class="dashboard-grid">
                <div class="stat-card">
                    <h3>Total Restaurants</h3>
                    <p class="stat-value" id="total-restaurants">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Orders</h3>
                    <p class="stat-value" id="total-orders">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <p class="stat-value" id="total-revenue">₹0</p>
                </div>
                <div class="stat-card">
                    <h3>Active Subscriptions</h3>
                    <p class="stat-value" id="active-subscriptions">0</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Restaurants List</h3>
                </div>
                <div class="card-body">
                    <div id="admin-restaurants-list" class="restaurants-table">
                        <p class="empty-state">No restaurants found</p>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Notification Template -->
    <template id="notification-template">
        <div class="notification" id="notification-item">
            <div class="notification-content">
                <span id="notification-message"></span>
            </div>
            <button class="notification-close" onclick="closeNotification(this.parentElement)">&times;</button>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
